services:
  postgres:
    image: postgres:16-alpine
    container_name: agents_office_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agents_dev
      POSTGRES_PASSWORD: agents_dev_pass
      POSTGRES_DB: agents_office
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents_dev -d agents_office"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: agents_office_app
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 数据库（容器内部通过服务名连接）
      DATABASE_URL_SYNC: postgresql://agents_dev:agents_dev_pass@postgres:5432/agents_office
      # LLM API Keys（从 .env 文件读取）
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-}

volumes:
  pgdata:
    driver: local
